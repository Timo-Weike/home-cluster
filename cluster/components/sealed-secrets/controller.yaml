# cluster/components/sealed-secrets/application.yaml
#
# Deploys the Bitnami Sealed Secrets controller.
# Once running, you can encrypt any Kubernetes Secret with:
#
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# The resulting SealedSecret is safe to commit to this public repository.
# The controller decrypts it at runtime using its private key, which
# lives only inside the cluster.
#
# IMPORTANT: Back up the controller's private key after first install:
#   kubectl get secret -n sealed-secrets \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-master-key-backup.yaml
#
# Store the backup somewhere safe (NOT in this repo).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Sync wave 0 — install before any component that needs decrypted secrets.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: "2.x"   # Renovate will bump the patch/minor version
    helm:
      valuesObject:
        # Use a fixed, predictable service name so kubeseal can find it.
        fullnameOverride: sealed-secrets-controller
        # Keep one replica for a home cluster; increase for HA if needed.
        replicaCount: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true