image:
  repository: ghcr.io/requarks/wiki
  tag: "2"
  pullPolicy: IfNotPresent

# Expose via NodePort at app.home:30782
service:
  type: NodePort
  port: 3000
  nodePort: 30782

# PostgreSQL connection — credentials come from wikijs-db-secret SealedSecret
postgresql:
  enabled: true
  image:
    tag: latest
  auth:
    username: wikijs
    database: wikijs
    existingSecret: wikijs-db-secret
    secretKeys:
      userPasswordKey: db-password
      adminPasswordKey: db-admin-password
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 5Gi

# Wiki.js app config
config:
  host: "http://app.home:30782"
  port: 3000
  db:
    type: postgres
    host: "wikijs-postgresql"
    port: 5432
    user: wikijs
    db: wikijs
    # password injected via DB_PASS env var from wikijs-db-secret
    ssl: false

# Inject DB password and OIDC secret from SealedSecrets
extraEnvVarsSecret: wikijs-db-secret

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

replicaCount: 1