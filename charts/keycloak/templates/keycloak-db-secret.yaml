apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: keycloak-db-secret
  namespace: keycloak
spec:
  encryptedData:
    # Both keys must be sealed independently — use the same or different
    # plaintext passwords.
    #
    # db-password      → Bitnami postgresql.auth.secretKeys.userPasswordKey
    #                    → KC_DB_PASSWORD for Keycloak
    # db-admin-password → Bitnami postgresql.auth.secretKeys.adminPasswordKey
    #                    (postgres superuser, needed for init/migrations)
    #
    # Generate each with:
    #   echo -n 'your-password' | kubeseal --raw --from-file=/dev/stdin \
    #     --namespace keycloak --name keycloak-db-secret \
    #     --controller-namespace sealed-secrets
    db-password: 
    db-admin-password: 
  template:
    metadata:
      name: keycloak-db-secret
      namespace: keycloak
    type: Opaque
