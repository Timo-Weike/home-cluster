apiVersion: v2
name: keycloak
description: >
  Keycloak (via codecentric/keycloakx) with a Bitnami PostgreSQL sub-chart.
  Credentials are supplied via SealedSecrets; storage via Longhorn.
type: application
version: 0.1.0
appVersion: "26.0"  # Keycloak upstream version — update together with image.tag

dependencies:
  - name: keycloakx
    version: "2.x.x"
    repository: https://codecentric.github.io/helm-charts
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
