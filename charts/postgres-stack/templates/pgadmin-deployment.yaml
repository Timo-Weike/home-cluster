apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postgres-stack.fullname" . }}-pgadmin
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pgadmin
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.pgadmin.replicaCount }}
  selector:
    matchLabels:
      {{- include "postgres-stack.pgadmin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgres-stack.pgadmin.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the servers ConfigMap changes
        {{- if .Values.pgadmin.serverDefinition.enabled }}
        checksum/servers: {{ include (print $.Template.BasePath "/pgadmin-servers-cm.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.pgadmin.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgadmin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgadmin.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgadmin.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Build a pgpass file so pgAdmin can connect without prompting for a password
        - name: pgpass-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              printf '%s:%s:%s:%s:%s\n' \
                "{{ include "postgres-stack.postgres.host" . }}" \
                "{{ include "postgres-stack.postgres.port" . }}" \
                "{{ .Values.postgresql.auth.database }}" \
                "{{ .Values.postgresql.auth.username }}" \
                "$(cat /secrets/{{ include "postgres-stack.postgres.secretKey" . }})" \
                > /pgpass/pgpass
              chmod 600 /pgpass/pgpass
          volumeMounts:
            - name: pgpass
              mountPath: /pgpass
            - name: postgres-secret
              mountPath: /secrets
              readOnly: true
      containers:
        - name: pgadmin
          image: "{{ .Values.pgadmin.image.repository }}:{{ .Values.pgadmin.image.tag }}"
          imagePullPolicy: {{ .Values.pgadmin.image.pullPolicy }}
          {{- with .Values.pgadmin.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: {{ .Values.pgadmin.auth.email | quote }}
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgres-stack.pgadmin.secretName" . }}
                  key: {{ .Values.pgadmin.auth.secretKey }}
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "True"
            - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
              value: "False"
            {{- if .Values.pgadmin.serverDefinition.enabled }}
            - name: PGADMIN_SERVER_JSON_FILE
              value: /pgadmin4/servers/servers.json
            {{- end }}
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.pgadmin.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
            - name: pgpass
              mountPath: /pgpass
              subPath: pgpass
            {{- if .Values.pgadmin.serverDefinition.enabled }}
            - name: servers-config
              mountPath: /pgadmin4/servers
              readOnly: true
            {{- end }}
      volumes:
        - name: pgpass
          emptyDir: {}
        - name: postgres-secret
          secret:
            secretName: {{ include "postgres-stack.postgres.secretName" . }}
        {{- if .Values.pgadmin.serverDefinition.enabled }}
        - name: servers-config
          configMap:
            name: {{ include "postgres-stack.fullname" . }}-pgadmin-servers
        {{- end }}
        {{- if not .Values.pgadmin.persistence.enabled }}
        - name: pgadmin-data
          emptyDir: {}
        {{- else if .Values.pgadmin.persistence.existingClaim }}
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: {{ .Values.pgadmin.persistence.existingClaim }}
        {{- else }}
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: {{ include "postgres-stack.fullname" . }}-pgadmin
        {{- end }}
