{{- if .Values.pgadmin.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "postgres-stack.fullname" . }}-pgadmin
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pgadmin
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  {{- with .Values.pgadmin.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.pgadmin.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.pgadmin.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.pgadmin.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "postgres-stack.fullname" . }}-pgadmin
                port:
                  name: http
{{- end }}
