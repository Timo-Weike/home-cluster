{{- if and .Values.pgadmin.persistence.enabled (not .Values.pgadmin.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "postgres-stack.fullname" . }}-pgadmin
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: pgadmin
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  accessModes:
    - {{ .Values.pgadmin.persistence.accessMode }}
  {{- with .Values.pgadmin.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.pgadmin.persistence.size }}
{{- end }}
